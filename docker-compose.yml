services:
  partner-hub:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-please-change-this-secret}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.moonshot.cn/v1}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-kimi-k2-0711-preview}
      - UPLOAD_DIR=/data/uploads
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-20}
      - NINJAPEARL_API_KEY=${NINJAPEARL_API_KEY:-}
      - DATABASE_URL=file:/data/partner-hub.db
    volumes:
      - partner-data:/data
      - partner-uploads:/data/uploads
    restart: unless-stopped

  wecom-bot:
    build: .
    command: ["npx", "tsx", "scripts/wecom-bot.ts"]
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-please-change-this-secret}
      - DATABASE_URL=file:/data/partner-hub.db
      - WECOM_BOT_ID=${WECOM_BOT_ID:-}
      - WECOM_BOT_SECRET=${WECOM_BOT_SECRET:-}
      - WECOM_BOT_WS_URL=${WECOM_BOT_WS_URL:-}
      - WECOM_BOT_USER_ID=${WECOM_BOT_USER_ID:-}
    volumes:
      - partner-data:/data
    depends_on:
      - partner-hub
    restart: unless-stopped

volumes:
  partner-data:
  partner-uploads:

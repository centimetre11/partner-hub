services:
  partner-hub:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-please-change-this-secret}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.moonshot.cn/v1}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-kimi-k2-0711-preview}
    volumes:
      - partner-data:/data
    restart: unless-stopped

volumes:
  partner-data:

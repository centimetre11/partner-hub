services:
  db:
    image: postgres:16-alpine
    container_name: partner-hub-db-1
    restart: unless-stopped
    environment:
      - POSTGRES_USER=partnerhub
      - POSTGRES_PASSWORD=ph_pg_3Qx9Lm2Wv7Kc
      - POSTGRES_DB=partnerhub
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partnerhub -d partnerhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  partner-hub:
    build: .
    container_name: partner-hub-partner-hub-1
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://partnerhub:ph_pg_3Qx9Lm2Wv7Kc@db:5432/partnerhub
      - WECOM_BOT_ENABLED=false
      - HOSTNAME=0.0.0.0
    volumes:
      - partner-data:/data
      - partner-uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  wecom-bot:
    build: .
    container_name: partner-hub-wecom-bot-1
    restart: unless-stopped
    command: ["npm", "run", "wecom-bot"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://partnerhub:ph_pg_3Qx9Lm2Wv7Kc@db:5432/partnerhub
      - WECOM_BOT_ENABLED=true
      - HOSTNAME=0.0.0.0
    volumes:
      - partner-data:/data
      - partner-uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default

networks:
  default:

volumes:
  partner-data:
  partner-uploads:
  pg-data:

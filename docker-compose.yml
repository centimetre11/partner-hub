services:
  db:
    image: postgres:16-alpine
    container_name: partner-hub-db-1
    restart: unless-stopped
    environment:
      - POSTGRES_USER=partnerhub
      - POSTGRES_PASSWORD=ph_pg_3Qx9Lm2Wv7Kc
      - POSTGRES_DB=partnerhub
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partnerhub -d partnerhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # 开源转写：faster-whisper via whisper-asr-webservice
  # https://github.com/ahmetoner/whisper-asr-webservice
  whisper-asr:
    # 默认 CPU；有 GPU 时可改为 latest-gpu 并启用下方 deploy
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: partner-hub-whisper-asr-1
    restart: unless-stopped
    environment:
      - ASR_ENGINE=faster_whisper
      # 8GB 机器用 small；内存 ≥16GB 可改 medium；有 GPU 可改 large-v3
      - ASR_MODEL=${ASR_MODEL:-small}
      - ASR_MODEL_PATH=/root/.cache/whisper
    volumes:
      - whisper-cache:/root/.cache/whisper
    # 避免把主站内存打满；识别时再吃满限额
    mem_limit: 3g
    # GPU 示例（需 NVIDIA Container Toolkit）:
    # image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    # environment ASR_MODEL=large-v3
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    ports:
      - "9000:9000"
    networks:
      - default
    profiles:
      - asr

  partner-hub:
    build: .
    container_name: partner-hub-partner-hub-1
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://partnerhub:ph_pg_3Qx9Lm2Wv7Kc@db:5432/partnerhub
      - WECOM_BOT_ENABLED=false
      - HOSTNAME=0.0.0.0
      - UPLOAD_DIR=/data/uploads
      # 启用语音时：docker compose --profile asr up -d whisper-asr
      - ASR_BASE_URL=${ASR_BASE_URL:-http://whisper-asr:9000}
      - ASR_PROVIDER=whisper_asr_webservice
      - ASR_LANGUAGE=zh
      - NODE_OPTIONS=--max-old-space-size=3072
    volumes:
      - partner-data:/data
      - partner-uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  wecom-bot:
    build: .
    container_name: partner-hub-wecom-bot-1
    restart: unless-stopped
    command: ["npm", "run", "wecom-bot"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://partnerhub:ph_pg_3Qx9Lm2Wv7Kc@db:5432/partnerhub
      - WECOM_BOT_ENABLED=true
      - HOSTNAME=0.0.0.0
    volumes:
      - partner-data:/data
      - partner-uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default

networks:
  default:

volumes:
  partner-data:
  partner-uploads:
  pg-data:
  whisper-cache:
